name: Cleanup Guardrails resource group
description: |
  Deletes a specific Guardrails resource group after deleting DCRs, DCEs, and
  optionally force-deleting Log Analytics workspaces.

  Requires a prior azure/login@v2 step in the calling job to establish Az context.

inputs:
  subscription-id:
    required: true
    description: Azure subscription ID containing the resource group.
  resource-group-name:
    required: true
    description: Exact resource group name to delete.
  confirm-resource-group-name:
    required: true
    description: Must exactly match resource-group-name.
  force-delete-log-analytics-workspace:
    required: false
    default: 'true'
    description: Whether to force-delete Log Analytics workspaces before deleting the resource group.
  dry-run:
    required: false
    default: 'false'
    description: List resources and exit without deleting anything.
  timeout-minutes:
    required: false
    default: '30'
    description: Maximum minutes to wait for the resource group deletion to complete.

runs:
  using: composite
  steps:
    - name: Cleanup Guardrails resource group
      uses: azure/powershell@v2
      env:
        GSA_SUBSCRIPTION_ID: ${{ inputs.subscription-id }}
        GSA_RESOURCE_GROUP_NAME: ${{ inputs.resource-group-name }}
        GSA_CONFIRM_RESOURCE_GROUP_NAME: ${{ inputs.confirm-resource-group-name }}
        GSA_FORCE_DELETE_LAW: ${{ inputs.force-delete-log-analytics-workspace }}
        GSA_DRY_RUN: ${{ inputs.dry-run }}
        GSA_TIMEOUT_MINUTES: ${{ inputs.timeout-minutes }}
      with:
        azPSVersion: latest
        inlineScript: |
          $forceDeleteLogAnalyticsWorkspace = [System.Convert]::ToBoolean($env:GSA_FORCE_DELETE_LAW)
          $dryRun = [System.Convert]::ToBoolean($env:GSA_DRY_RUN)
          & (Join-Path $env:GITHUB_WORKSPACE 'tools/Invoke-GuardrailsResourceGroupCleanup.ps1') `
            -SubscriptionId $env:GSA_SUBSCRIPTION_ID `
            -ResourceGroupName $env:GSA_RESOURCE_GROUP_NAME `
            -ConfirmResourceGroupName $env:GSA_CONFIRM_RESOURCE_GROUP_NAME `
            -ForceDeleteLogAnalyticsWorkspace $forceDeleteLogAnalyticsWorkspace `
            -DryRun $dryRun `
            -TimeoutMinutes ([int]$env:GSA_TIMEOUT_MINUTES)