name: Pre-clean Guardrails CI deployment
description: |
  Removes the previously deployed Guardrails environment and prepares config for
  the next deployment.

  All resources (KV, storage, AA, RG) continue to use the same static
  uniqueNameSuffix as before — no behaviour change there.
  Only the Log Analytics Workspace gets an additional run-specific prefix
  (r<GITHUB_RUN_NUMBER>) embedded in logAnalyticsworkspaceName so each
  deployment creates a fresh workspace with a unique name.

  The previous run's LAW suffix is tracked in a dedicated GitHub environment
  variable (e.g. LAW_RUN_SUFFIX) so pre-clean can construct the exact previous
  workspace name for teardown.

  Exposes GSA_LAW_RUN_SUFFIX to GITHUB_ENV so the deploy step can write
  logAnalyticsworkspaceName correctly in its own config.json.

  Requires a prior azure/login@v2 step in the calling job.

inputs:
  subscription-id:
    required: true
    description: Azure subscription ID used for the Guardrails deployment.
  suffix-environment-variable-name:
    required: true
    description: |
      GITHUB_ENV variable that receives the static unique-name-suffix for use
      in subsequent steps (e.g. CI_UNIQUENAME_SUFFIX). Behaviour unchanged from
      the original action.
  unique-name-suffix:
    required: true
    description: |
      Static suffix used for all resources except LAW (e.g. the value of
      vars.UNIQUENAME_SUFFIX). Passed through to uniqueNameSuffix in config.json
      unchanged.
  previous-law-run-suffix:
    required: false
    default: ''
    description: |
      LAW-specific suffix from the previous run (e.g. r141).
      Pass the value of vars.LAW_RUN_SUFFIX (or the dev equivalent).
      Leave empty on the first run — LAW teardown is skipped.
  law-run-suffix-github-variable-name:
    required: true
    description: |
      GitHub environment variable to update with the new LAW run suffix after
      cleanup (e.g. LAW_RUN_SUFFIX or LAW_RUN_SUFFIX_DEV).
  github-environment-name:
    required: true
    description: GitHub Actions environment that owns the variable (e.g. 'test' or 'dev').
  github-token:
    required: true
    description: GITHUB_TOKEN passed to gh CLI for updating the LAW suffix variable.
  key-vault-name:
    required: true
    description: Base Key Vault name for config.json.
  resource-group:
    required: true
    description: Base resource group name for config.json.
  storage-account-name:
    required: true
    description: Base Storage Account name for config.json.
  log-analytics-workspace-name:
    required: true
    description: Base Log Analytics workspace name for config.json (without any suffix).
  automation-account-name:
    required: true
    description: Base Automation Account name for config.json.
  first-break-glass-account-upn:
    required: true
  second-break-glass-account-upn:
    required: true
  pbmm-policy-id:
    required: true
  allowed-location-policy-id:
    required: true
  allowed-location-initiative-id:
    required: true
  cbs-subscription-name:
    required: true
  security-law-resource-id:
    required: true
  health-law-resource-id:
    required: true
  lighthouse-service-provider-tenant-id:
    required: true
  lighthouse-principal-display-name:
    required: true
  lighthouse-principal-id:
    required: true
  lighthouse-target-management-group-id:
    required: true
  ssc-readonly-service-principal-appid:
    required: true
  cloud-usage-profiles:
    required: true
  tenant-id:
    required: true
  department-number:
    required: false
    default: '163'
  locale:
    required: false
    default: en-CA
  security-retention-days:
    required: false
    default: '730'

runs:
  using: composite
  steps:
    - name: Pre-clean and prepare deployment suffix
      uses: azure/powershell@v2
      env:
        GSA_SUBSCRIPTION_ID:            ${{ inputs.subscription-id }}
        GSA_SUFFIX_ENV_NAME:            ${{ inputs.suffix-environment-variable-name }}
        GSA_STATIC_SUFFIX:              ${{ inputs.unique-name-suffix }}
        GSA_PREVIOUS_LAW_SUFFIX:        ${{ inputs.previous-law-run-suffix }}
        GSA_KEY_VAULT_NAME:             ${{ inputs.key-vault-name }}
        GSA_RESOURCE_GROUP:             ${{ inputs.resource-group }}
        GSA_STORAGE_ACCOUNT_NAME:       ${{ inputs.storage-account-name }}
        GSA_LAW_NAME:                   ${{ inputs.log-analytics-workspace-name }}
        GSA_AUTOMATION_ACCOUNT_NAME:    ${{ inputs.automation-account-name }}
        GSA_BGA1:                       ${{ inputs.first-break-glass-account-upn }}
        GSA_BGA2:                       ${{ inputs.second-break-glass-account-upn }}
        GSA_PBMM_POLICY_ID:             ${{ inputs.pbmm-policy-id }}
        GSA_ALLOWED_LOCATION_POLICY_ID: ${{ inputs.allowed-location-policy-id }}
        GSA_ALLOWED_LOCATION_INITIATIVE_ID: ${{ inputs.allowed-location-initiative-id }}
        GSA_DEPARTMENT_NUMBER:          ${{ inputs.department-number }}
        GSA_CBS_SUBSCRIPTION_NAME:      ${{ inputs.cbs-subscription-name }}
        GSA_SECURITY_LAW_RESOURCE_ID:   ${{ inputs.security-law-resource-id }}
        GSA_HEALTH_LAW_RESOURCE_ID:     ${{ inputs.health-law-resource-id }}
        GSA_LOCALE:                     ${{ inputs.locale }}
        GSA_LIGHTHOUSE_TENANT_ID:       ${{ inputs.lighthouse-service-provider-tenant-id }}
        GSA_LIGHTHOUSE_DISPLAY_NAME:    ${{ inputs.lighthouse-principal-display-name }}
        GSA_LIGHTHOUSE_PRINCIPAL_ID:    ${{ inputs.lighthouse-principal-id }}
        GSA_LIGHTHOUSE_TARGET_MG_ID:    ${{ inputs.lighthouse-target-management-group-id }}
        GSA_READONLY_SPN_APPID:         ${{ inputs.ssc-readonly-service-principal-appid }}
        GSA_SECURITY_RETENTION_DAYS:    ${{ inputs.security-retention-days }}
        GSA_CLOUD_USAGE_PROFILES:       ${{ inputs.cloud-usage-profiles }}
        GSA_TENANT_ID:                  ${{ inputs.tenant-id }}
        GSA_ACTION_REPO_ROOT:           ${{ github.action_path }}/../../..
      with:
        azPSVersion: latest
        inlineScript: |
          $ErrorActionPreference = 'Stop'

          $subscriptionId    = $env:GSA_SUBSCRIPTION_ID
          # Static suffix — applied to KV, storage, AA, RG, and also appended to LAW
          # by Confirm-GSAConfigurationParameters (behaviour unchanged from before).
          $staticSuffix      = $env:GSA_STATIC_SUFFIX
          # LAW-specific run suffix from the previous pipeline run (empty on first run).
          $previousLawSuffix = $env:GSA_PREVIOUS_LAW_SUFFIX
          # New LAW run suffix for this run. 'r' prefix: Azure names must start with a letter.
          $newLawSuffix      = "r$env:GITHUB_RUN_NUMBER"

          Set-AzContext -SubscriptionId $subscriptionId

          $actionRepoRoot = Resolve-Path $env:GSA_ACTION_REPO_ROOT | Select-Object -ExpandProperty Path
          Import-Module (Join-Path $actionRepoRoot 'src/GuardrailsSolutionAcceleratorSetup')

          # ── Helper: build a config hashtable ────────────────────────────────────────
          # $lawNameOverride lets teardown supply the previous run's LAW base name
          # (e.g. "logcac-r141") while keeping uniqueNameSuffix = static for all
          # other resources. For normal config, pass $null to use the bare base name.
          function New-Config([string]$suffix, [string]$lawNameOverride = $null) {
            $lawName = if ($lawNameOverride) { $lawNameOverride } else { $env:GSA_LAW_NAME }
            return [ordered]@{
              keyVaultName                       = $env:GSA_KEY_VAULT_NAME
              resourcegroup                      = $env:GSA_RESOURCE_GROUP
              region                             = 'CanadaCentral'
              storageaccountName                 = $env:GSA_STORAGE_ACCOUNT_NAME
              logAnalyticsworkspaceName          = $lawName
              autoMationAccountName              = $env:GSA_AUTOMATION_ACCOUNT_NAME
              FirstBreakGlassAccountUPN          = $env:GSA_BGA1
              SecondBreakGlassAccountUPN         = $env:GSA_BGA2
              PBMMPolicyID                       = $env:GSA_PBMM_POLICY_ID
              AllowedLocationPolicyId            = $env:GSA_ALLOWED_LOCATION_POLICY_ID
              AllowedLocationInitiativeId        = $env:GSA_ALLOWED_LOCATION_INITIATIVE_ID
              DepartmentNumber                   = $env:GSA_DEPARTMENT_NUMBER
              CBSSubscriptionName                = $env:GSA_CBS_SUBSCRIPTION_NAME
              securityLAWResourceId              = $env:GSA_SECURITY_LAW_RESOURCE_ID
              healthLAWResourceId                = $env:GSA_HEALTH_LAW_RESOURCE_ID
              Locale                             = $env:GSA_LOCALE
              lighthouseServiceProviderTenantID  = $env:GSA_LIGHTHOUSE_TENANT_ID
              lighthousePrincipalDisplayName     = $env:GSA_LIGHTHOUSE_DISPLAY_NAME
              lighthousePrincipalId              = $env:GSA_LIGHTHOUSE_PRINCIPAL_ID
              lighthouseTargetManagementGroupID  = $env:GSA_LIGHTHOUSE_TARGET_MG_ID
              subscriptionId                     = $subscriptionId
              SSCReadOnlyServicePrincipalNameAPPID = $env:GSA_READONLY_SPN_APPID
              uniqueNameSuffix                   = $suffix
              securityRetentionDays              = $env:GSA_SECURITY_RETENTION_DAYS
              cloudUsageProfiles                 = $env:GSA_CLOUD_USAGE_PROFILES
              tenantId                           = $env:GSA_TENANT_ID
            }
          }

          $configFilePath = Join-Path $env:GITHUB_WORKSPACE 'config.json'

          # ── 1. Tear down the previous deployment ─────────────────────────────────────
          # All resources use $staticSuffix (unchanged). The LAW teardown targets the
          # previous run's workspace: "$lawBase-$previousLawSuffix" — Confirm-GSAConfigurationParameters
          # appends "-$staticSuffix" to produce the full workspace name, e.g.
          # "logcac-r141-abc123". All other resources resolve normally via $staticSuffix.
          if (-not [string]::IsNullOrWhiteSpace($previousLawSuffix)) {
            $previousRGName  = "$($env:GSA_RESOURCE_GROUP)-$staticSuffix"
            $previousLAWBase = "$($env:GSA_LAW_NAME)-$previousLawSuffix"
            Write-Output "Tearing down previous deployment (RG: '$previousRGName', LAW base: '$previousLAWBase-$staticSuffix')..."

            if (Get-AzResourceGroup -Name $previousRGName -ErrorAction SilentlyContinue) {
              New-Config $staticSuffix $previousLAWBase |
                ConvertTo-Json -Depth 5 | Set-Content -Path $configFilePath

              Push-Location -Path (Join-Path $actionRepoRoot 'setup')
              try {
                Remove-GSACentralizedReportingCustomerComponents -Force -configFilePath $configFilePath
                Remove-GSACentralizedDefenderCustomerComponents  -Force -configFilePath $configFilePath
                Remove-GSACoreResources -Force -Wait              -configFilePath $configFilePath
              }
              finally { Pop-Location }
            }
            else {
              Write-Output "RG '$previousRGName' not found — skipping teardown."
            }
          }
          else {
            Write-Output "No previous LAW suffix supplied — skipping teardown (first run)."
          }

          # ── 2. Write config.json for the new deployment ──────────────────────────────
          # logAnalyticsworkspaceName = "$lawBase-$newLawSuffix" (e.g. "logcac-r142").
          # Confirm-GSAConfigurationParameters then appends "-$staticSuffix" giving the
          # final unique workspace name (e.g. "logcac-r142-abc123").
          # All other resources continue to use $staticSuffix unchanged.
          $newLAWBase = "$($env:GSA_LAW_NAME)-$newLawSuffix"
          New-Config $staticSuffix $newLAWBase |
            ConvertTo-Json -Depth 5 | Set-Content -Path $configFilePath
          Write-Output "config.json written (LAW base: '$newLAWBase', static suffix: '$staticSuffix')."

          # Expose values to subsequent steps in this job:
          #   CI_UNIQUENAME_SUFFIX — unchanged; deploy step uses this for uniqueNameSuffix
          #   GSA_LAW_RUN_SUFFIX   — new; deploy step uses this for logAnalyticsworkspaceName
          "$($env:GSA_SUFFIX_ENV_NAME)=$staticSuffix"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "GSA_LAW_RUN_SUFFIX=$newLawSuffix"            | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Output "Azure steps complete. LAW run suffix for this deployment: '$newLawSuffix'."

    - name: Record new LAW run suffix in GitHub variable
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # GSA_LAW_RUN_SUFFIX was written to GITHUB_ENV by the previous step.
        # gh variable set updates the environment variable so the next run knows
        # which LAW to clean up. Runs after Azure teardown so a failed cleanup
        # leaves the variable pointing at the old deployment, allowing a retry.
        gh variable set "${{ inputs.law-run-suffix-github-variable-name }}" \
          --body "$GSA_LAW_RUN_SUFFIX" \
          --env "${{ inputs.github-environment-name }}" \
          --repo "$GITHUB_REPOSITORY"
        echo "GitHub variable '${{ inputs.law-run-suffix-github-variable-name }}' updated to '$GSA_LAW_RUN_SUFFIX'."